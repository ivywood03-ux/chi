<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>랜덤 포토</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #0d0d0d;
  color: #f0ede6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  max-width: 480px;
  margin: 0 auto;
}

.logo {
  font-family: 'Gowun Dodum', serif;
  font-size: 12px;
  letter-spacing: .25em;
  color: #555;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.frame {
  width: 100%;
  max-width: 360px;
  aspect-ratio: 9 / 16;
  border-radius: 20px;
  overflow: hidden;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
  margin-bottom: 20px;
}

.frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0;
  transition: opacity .5s ease;
}

.frame img.visible { opacity: 1; }

.shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
  background-size: 200% 100%;
  animation: sh 1.4s infinite;
}

@keyframes sh {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.photo-name {
  font-size: 17px;
  font-weight: 500;
  margin-bottom: 4px;
  text-align: center;
}

.photo-sub {
  font-size: 12px;
  color: #555;
  margin-bottom: 32px;
  text-align: center;
}

.btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 360px;
}

.btn {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  font-size: 15px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  cursor: pointer;
  border: none;
  transition: all .15s;
}

.btn:active { transform: scale(0.97); }

.btn-save {
  background: #e8d5a3;
  color: #1a1408;
}
.btn-save:hover { background: #d4be87; }

.btn-next {
  background: #1f1f1f;
  color: #f0ede6;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-next:hover { background: #2a2a2a; }

.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #f0ede6;
  color: #1a1a1a;
  padding: 10px 24px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  z-index: 100;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.admin-btn {
  position: fixed;
  bottom: 20px; right: 20px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #444;
  border-radius: 50%;
  width: 38px; height: 38px;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: flex-end;
}
.overlay.open { display: flex; }

.panel {
  background: #111;
  border-top: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 20px;
}

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}

.panel-title { font-size: 15px; font-weight: 700; color: #e8d5a3; }
.close-btn { background: none; border: none; color: #555; font-size: 20px; cursor: pointer; }

.sec-label {
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  color: #444; margin-bottom: 10px; margin-top: 18px;
}

input[type=url], input[type=text] {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 8px;
  padding: 11px 14px;
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  color: #f0ede6;
  margin-bottom: 8px;
  outline: none;
}
input:focus { border-color: #e8d5a3; }
input::placeholder { color: #444; }

.add-btn {
  width: 100%; padding: 12px;
  background: #e8d5a3; color: #1a1408;
  border: none; border-radius: 8px;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
  cursor: pointer; margin-bottom: 4px;
}
.add-btn:hover { background: #d4be87; }

.img-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.img-card {
  border-radius: 10px;
  overflow: hidden;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.07);
  position: relative;
}

.img-card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
  display: block;
}

.img-card-footer {
  padding: 7px 9px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}

.row-name { font-size: 12px; font-weight: 500; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
.row-name:hover { color: #e8d5a3; }
.name-input {
  font-size: 12px; font-weight: 500; flex: 1; min-width: 0;
  background: #222; border: 1px solid #e8d5a3;
  border-radius: 4px; padding: 2px 6px;
  color: #f0ede6; font-family: 'Noto Sans KR', sans-serif;
  outline: none; width: 100%;
}

.del-btn {
  background: none; border: 1px solid rgba(192,57,43,0.3);
  border-radius: 5px; color: #c0392b;
  padding: 3px 7px; font-size: 11px; cursor: pointer; flex-shrink: 0;
}
.del-btn:hover { background: rgba(192,57,43,0.1); }

.builtin-tag {
  font-size: 10px; color: #444; flex-shrink: 0;
  background: rgba(255,255,255,0.04);
  border-radius: 4px; padding: 2px 6px;
}

.empty-msg { color: #444; font-size: 13px; padding: 12px 0; text-align: center; }

.notice {
  background: rgba(232,213,163,0.06);
  border: 1px solid rgba(232,213,163,0.12);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px; color: #777; line-height: 1.8;
  margin-top: 14px;
}
.notice b { color: #e8d5a3; font-weight: 500; }
</style>
</head>
<body>

<div class="logo">✦ Random Photo</div>

<div class="frame" id="frame">
  <div class="shimmer" id="shimmer"></div>
  <img id="photo" alt="랜덤 사진">
</div>

<div class="photo-name" id="photo-name">불러오는 중...</div>
<div class="photo-sub" id="photo-sub"></div>

<div class="btns">
  <button class="btn btn-save" onclick="savePhoto()">💾 이 사진 저장하기</button>
  <button class="btn btn-next" onclick="nextPhoto()">🔀 다른 사진 보기</button>
</div>

<button class="admin-btn" onclick="openPanel()" title="관리자">⚙</button>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-header">
      <span class="panel-title">⚙ 관리자 — 이미지 관리</span>
      <button class="close-btn" onclick="closePanel()">✕</button>
    </div>

    <div class="notice" style="margin-top:0;margin-bottom:4px">
      <b>📌 사용 방법</b><br>
      이 HTML 파일 안의 <b>IMAGES 배열</b>에 사진 URL을 넣고<br>
      파일을 <b>netlify.com/drop</b>에 올리면 QR로 공유 가능해요.<br>
      아래에서 임시로 추가할 수도 있어요 (브라우저 저장).
    </div>

    <div class="sec-label">이미지 추가 (임시)</div>
    <input type="url" id="inp-url" placeholder="이미지 URL (https://...)">
    <input type="text" id="inp-name" placeholder="사진 이름 (선택)">
    <button class="add-btn" onclick="addImg()">+ 추가</button>

    <div class="sec-label">전체 이미지 (<span id="img-count">0</span>장)</div>
    <div id="img-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  ★ 관리자 설정 — 여기에 이미지를 넣어주세요 ★
// ══════════════════════════════════════════════════
let IMAGES = [
  { url: "photo1.jpg",  name: "사진 1" },
  { url: "photo2.jpg",  name: "사진 2" },
  { url: "photo3.jpg",  name: "사진 3" },
  { url: "photo4.jpg",  name: "사진 4" },
  { url: "photo5.jpg",  name: "사진 5" },
  { url: "photo6.jpg",  name: "사진 6" },
  { url: "photo7.jpg",  name: "사진 7" },
  { url: "photo8.jpg",  name: "사진 8" },
  { url: "photo9.jpg",  name: "사진 9" },
  { url: "photo10.jpg", name: "사진 10" },
  { url: "photo11.jpg", name: "사진 11" },
  { url: "photo12.jpg", name: "사진 12" },
  { url: "photo13.jpg", name: "사진 13" },
];
// ══════════════════════════════════════════════════

let extraImages = [];
let allImages = [];
let currentIdx = -1;

function loadExtra() {
  try { extraImages = JSON.parse(localStorage.getItem('rqr_extra') || '[]'); } catch(e) { extraImages = []; }
  // 내장 이미지 이름 덮어쓰기 (저장된 게 있으면)
  try {
    const savedNames = JSON.parse(localStorage.getItem('rqr_names') || '{}');
    IMAGES = IMAGES.map((img, i) => savedNames[i] ? { ...img, name: savedNames[i] } : img);
  } catch(e) {}
}

function saveExtra() {
  localStorage.setItem('rqr_extra', JSON.stringify(extraImages));
}

function saveBuiltinName(idx, name) {
  try {
    const saved = JSON.parse(localStorage.getItem('rqr_names') || '{}');
    saved[idx] = name;
    localStorage.setItem('rqr_names', JSON.stringify(saved));
  } catch(e) {}
}

function buildAll() {
  allImages = [...IMAGES, ...extraImages];
}

function showPhoto(idx) {
  if (!allImages.length) {
    document.getElementById('photo-name').textContent = '등록된 사진이 없어요';
    document.getElementById('photo-sub').textContent = '관리자 패널에서 이미지를 추가해주세요';
    return;
  }
  currentIdx = idx;
  const item = allImages[idx];
  const img = document.getElementById('photo');
  const shimmer = document.getElementById('shimmer');

  img.classList.remove('visible');
  shimmer.style.display = 'block';

  img.onload = () => {
    shimmer.style.display = 'none';
    img.classList.add('visible');
  };
  img.onerror = () => {
    shimmer.style.display = 'none';
  };
  img.src = item.url;
  document.getElementById('photo-name').textContent = item.name || '사진';
  document.getElementById('photo-sub').textContent = (idx + 1) + ' / ' + allImages.length + '장';
}

function nextPhoto() {
  if (!allImages.length) return;
  let idx;
  do { idx = Math.floor(Math.random() * allImages.length); }
  while (allImages.length > 1 && idx === currentIdx);
  showPhoto(idx);
}

function savePhoto() {
  if (currentIdx < 0 || !allImages.length) return;
  const item = allImages[currentIdx];
  const a = document.createElement('a');
  a.href = item.url;
  a.download = (item.name || 'photo') + '.jpg';
  a.target = '_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast('💾 저장! (팝업 차단 시 사진 길게 눌러서 저장하세요)');
}

function openPanel() {
  document.getElementById('overlay').classList.add('open');
  renderAdminList();
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  buildAll();
  if (currentIdx >= allImages.length) currentIdx = -1;
  nextPhoto();
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closePanel();
}

function addImg() {
  const url = document.getElementById('inp-url').value.trim();
  const name = document.getElementById('inp-name').value.trim();
  if (!url) { toast('URL을 입력해주세요'); return; }
  if (!url.startsWith('http')) { toast('http로 시작하는 URL을 입력해주세요'); return; }
  extraImages.push({ url, name: name || ('사진 ' + (extraImages.length + 1)), id: Date.now() });
  saveExtra();
  document.getElementById('inp-url').value = '';
  document.getElementById('inp-name').value = '';
  renderAdminList();
  toast('✓ 추가됐어요!');
}

function delExtra(id) {
  extraImages = extraImages.filter(i => i.id !== id);
  saveExtra();
  renderAdminList();
  toast('삭제했어요');
}

function startRename(key, currentName) {
  const span = document.getElementById('name-' + key);
  if (!span) return;
  const input = document.createElement('input');
  input.className = 'name-input';
  input.value = currentName;
  span.replaceWith(input);
  input.focus();
  input.select();

  function commit() {
    const newName = input.value.trim() || currentName;
    // key: "b-0" = builtin idx 0, "e-ID" = extra id
    if (key.startsWith('b-')) {
      const idx = parseInt(key.slice(2));
      IMAGES[idx].name = newName;
      saveBuiltinName(idx, newName);
    } else {
      const id = parseInt(key.slice(2));
      const ex = extraImages.find(i => i.id === id);
      if (ex) { ex.name = newName; saveExtra(); }
    }
    buildAll();
    renderAdminList();
    if (allImages[currentIdx]) document.getElementById('photo-name').textContent = allImages[currentIdx].name;
    toast('✓ 이름 변경됐어요!');
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = currentName; input.blur(); } });
}

function renderAdminList() {
  buildAll();
  document.getElementById('img-count').textContent = allImages.length;
  const el = document.getElementById('img-list');
  if (!allImages.length) {
    el.innerHTML = '<div class="empty-msg">등록된 이미지가 없어요</div>';
    return;
  }
  el.innerHTML = '<div class="img-grid">' + allImages.map((img, i) => {
    const key = img.id ? 'e-' + img.id : 'b-' + i;
    return `
    <div class="img-card">
      <img src="${img.url}" alt="${img.name}" onerror="this.style.opacity=.1;this.style.background='#222'">
      <div class="img-card-footer">
        <span class="row-name" id="name-${key}" onclick="startRename('${key}','${img.name.replace(/'/g,"\\'")}')">✏ ${img.name}</span>
        ${img.id
          ? `<button class="del-btn" onclick="delExtra(${img.id})">삭제</button>`
          : `<span class="builtin-tag">내장</span>`}
      </div>
    </div>`;
  }).join('') + '</div>';
}

// 초기화
loadExtra();
buildAll();
nextPhoto();
</script>
</body>
</html>
